<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TraderFrame PNG Exporter</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      img {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <img alt="" />
    <script>
      const params = new URLSearchParams(window.location.search);
      const src = params.get("src");
      document.querySelector("img").src = src || "traderframe-symbol.svg";
    </script>
  </body>
</html>
